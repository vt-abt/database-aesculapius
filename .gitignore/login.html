{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 400px; margin: 3rem auto;">
    <h2 style="text-align: center;">{{ role|capitalize }} Login</h2>
    <form action="/login/{{ role }}" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" style="width: 100%;">Sign In</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">
        <a href="/" style="text-decoration: none; color: #7f8c8d;">&larr; Back to Entry</a>
    </p>
</div>
{% endblock %}
